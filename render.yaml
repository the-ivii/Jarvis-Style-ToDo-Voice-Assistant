services:
  - type: web
    name: voice-todo-agent
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: USE_EMBEDDINGS
        value: "false"
      - key: GOOGLE_API_KEY
        sync: false
